# Lefthook config for Python projects.
# Matches CI lint checks so commits never fail in pipeline.

pre-commit:
  parallel: true
  commands:
    worktree-branch-guard:
      run: |
        TOPLEVEL=$(git rev-parse --show-toplevel)
        git worktree list --porcelain 2>/dev/null | awk '/^worktree/{wt=$2} /^branch/{print wt " " $2}' | \
        while IFS=' ' read -r wt br; do
          CURRENT=$(git branch --show-current)
          if [ "refs/heads/$CURRENT" = "$br" ] && [ "$wt" != "$TOPLEVEL" ]; then
            echo "ERROR: Branch '$CURRENT' belongs to worktree $wt, not $TOPLEVEL"
            echo "Run your commit from: $wt"
            exit 1
          fi
        done
    ruff-check:
      glob: "*.py"
      run: 'if command -v ruff >/dev/null; then ruff check {staged_files}; else echo "ruff not installed, skipping"; fi'
    ruff-format:
      glob: "*.py"
      run: 'if command -v ruff >/dev/null; then ruff format --check {staged_files}; else echo "ruff not installed, skipping"; fi'
    shellcheck:
      glob: "*.sh"
      run: 'if command -v shellcheck >/dev/null; then shellcheck --severity=warning {staged_files}; else echo "shellcheck not installed, skipping"; fi'
    typos:
      run: 'if command -v typos >/dev/null; then typos {staged_files}; else echo "typos not installed, skipping"; fi'

pre-push:
  parallel: true
  commands:
    divergence-guard:
      run: |
        BRANCH=$(git branch --show-current)
        if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
          git fetch origin "$BRANCH" --quiet 2>/dev/null
          LOCAL=$(git rev-parse "$BRANCH")
          REMOTE=$(git rev-parse "origin/$BRANCH" 2>/dev/null)
          BASE=$(git merge-base "$BRANCH" "origin/$BRANCH" 2>/dev/null)
          if [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ] && [ "$BASE" != "$REMOTE" ]; then
            BEHIND=$(git rev-list --count "$BRANCH..origin/$BRANCH")
            AHEAD=$(git rev-list --count "origin/$BRANCH..$BRANCH")
            echo "ERROR: Local $BRANCH has diverged from origin/$BRANCH"
            echo "  Local is $AHEAD ahead, $BEHIND behind"
            echo ""
            echo "Fix: git pull --rebase origin $BRANCH"
            exit 1
          fi
        fi
    rebase-freshness-guard:
      run: |
        BRANCH=$(git branch --show-current)
        # Only check feature branches, not main
        if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then exit 0; fi

        git fetch origin main --quiet 2>/dev/null || exit 0

        # Block if branch is behind main — force rebase before push
        BEHIND=$(git rev-list --count HEAD..origin/main 2>/dev/null || echo 0)
        if [ "$BEHIND" -gt 0 ]; then
          echo "ERROR: Branch '$BRANCH' is $BEHIND commit(s) behind origin/main"
          echo "  This PR would silently revert changes merged to main after this branch was created."
          echo ""
          echo "  Fix: git fetch origin main && git rebase origin/main"
          exit 1
        fi
    semgrep:
      run: 'command -v semgrep >/dev/null && semgrep --config auto --severity ERROR --quiet . || echo "semgrep not installed, skipping"'
    security-audit:
      run: |
        if [ -f "requirements.txt" ]; then
          command -v pip-audit >/dev/null && pip-audit -r requirements.txt 2>/dev/null || true
        elif [ -f "package.json" ]; then
          command -v bun >/dev/null && bun audit 2>/dev/null || npm audit 2>/dev/null || true
        fi
    push-checks:
      # Sequential gate: lint + tests + code review. All must pass to push.
      # Sequential to avoid resource exhaustion on shared VPS.
      run: |
        echo "=== ruff lint ==="
        if command -v ruff >/dev/null; then
          ruff check .
        else
          echo "ruff not installed, skipping lint"
        fi

        echo "=== tests ==="
        if command -v pytest >/dev/null; then
          pytest --tb=short -q
        elif [ -f "pyproject.toml" ] && grep -q "pytest" pyproject.toml 2>/dev/null; then
          python -m pytest --tb=short -q
        else
          echo "pytest not available, skipping tests"
        fi

